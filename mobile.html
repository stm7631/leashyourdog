<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Leash Your Dog</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #FFF4E6; }
  body {
    font-family: var(--lyd-body, 'Archivo', sans-serif);
    color: #1A1A1A;
    --lyd-display: "Archivo Black", "Arial Black", Impact, sans-serif;
    --lyd-body: "Archivo", ui-sans-serif, system-ui, sans-serif;
    --lyd-display-transform: none;
    --lyd-display-tracking: -0.02em;
  }
  button { font-family: inherit; }

  @keyframes lyd-marquee       { from { transform: translateX(0) } to { transform: translateX(-50%) } }
  @keyframes lyd-spin          { to { transform: rotate(360deg) } }
  @keyframes lyd-censor-wobble { 0%,100% { transform: rotate(-1.5deg) } 50% { transform: rotate(1.5deg) } }
  @keyframes lyd-backdrop-in   { from { opacity: 0 } to { opacity: 1 } }
  @keyframes lyd-modal-in      { from { opacity: 0; transform: translateY(24px) scale(0.94) } to { opacity: 1; transform: translateY(0) scale(1) } }
  @keyframes lyd-spring-in     { 0% { transform: scale(0.6) translateY(40px); opacity: 0 } 100% { transform: scale(1) translateY(0); opacity: 1 } }
  @keyframes lyd-lasso-pop     { 0% { transform: scale(0.5); opacity: 0 } 60% { transform: scale(1.2); opacity: 1 } 100% { transform: scale(1); opacity: 1 } }
</style>
</head>
<body>
<div id="root"></div>

<script src="tokens.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<script type="text/babel">
// ─── Apply active font to CSS vars ──────────────────────────────────────────
(function () {
  const f = FONT_STACKS[ACTIVE_FONT] || FONT_STACKS.grotesque;
  const b = document.body;
  b.style.setProperty('--lyd-display', f.display);
  b.style.setProperty('--lyd-body', f.body);
  b.style.setProperty('--lyd-display-transform', f.displayTransform);
  b.style.setProperty('--lyd-display-tracking', f.displayTracking);
  b.style.fontFamily = f.body;
})();

function colorName(hex) {
  return ({ '#FF5B1F': 'SF Orange', '#1A1A1A': 'Ink Black', '#FFF4E6': 'Bone Cream', '#2E6BE6': 'Signal Blue' })[hex] || hex;
}

function pointInPolygon(p, poly) {
  if (poly.length < 3) return false;
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;
    const intersect = ((yi > p.y) !== (yj > p.y)) && (p.x < (xj-xi)*(p.y-yi)/(yj-yi+1e-9)+xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

// ─── Striped placeholder ──────────────────────────────────────────────────────
function StripedPlaceholder({ label, bg = LYD.cream, stripe = LYD.orange, style = {} }) {
  return (
    <div style={{
      position:'relative', width:'100%', height:'100%',
      backgroundImage:`repeating-linear-gradient(135deg, ${stripe} 0 14px, ${bg} 14px 32px)`,
      ...style,
    }}>
      <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{
          fontFamily:'"JetBrains Mono", monospace', fontSize:11, letterSpacing:'0.1em',
          background:LYD.ink, color:LYD.cream, padding:'6px 12px', whiteSpace:'nowrap',
        }}>{label}</div>
      </div>
    </div>
  );
}

// ─── Pill button ──────────────────────────────────────────────────────────────
function PillButton({ children, onClick, variant = 'primary', size = 'md', style = {} }) {
  const [pressed, setPressed] = React.useState(false);
  const palette = { primary: { bg:LYD.orange, fg:LYD.cream, border:LYD.ink }, dark: { bg:LYD.ink, fg:LYD.cream, border:LYD.ink }, ghost: { bg:LYD.cream, fg:LYD.ink, border:LYD.ink } }[variant];
  const sz = { sm: { px:16, py:8, fs:13 }, md: { px:22, py:12, fs:15 }, lg: { px:28, py:16, fs:17 } }[size];
  return (
    <button
      onPointerDown={() => setPressed(true)} onPointerUp={() => setPressed(false)}
      onClick={onClick}
      style={{
        border:`2px solid ${palette.border}`, background:palette.bg, color:palette.fg,
        padding:`${sz.py}px ${sz.px}px`, fontSize:sz.fs, fontWeight:700, letterSpacing:'0.02em',
        borderRadius: pressed ? 16 : 999,
        boxShadow: pressed ? LYD.chunk(palette.border,1,1) : LYD.chunk(palette.border,4,4),
        transform: pressed ? 'translate(2px,2px)' : 'translate(0,0)',
        transition:`border-radius 220ms ${LYD.spring}, box-shadow 160ms ${LYD.ease}, transform 140ms ${LYD.ease}`,
        cursor:'pointer', touchAction:'manipulation', ...style,
      }}
    >{children}</button>
  );
}

// ─── Censored word ────────────────────────────────────────────────────────────
function CensoredWord() {
  return (
    <span style={{ position:'relative', display:'inline-block', padding:'0 3px' }}>
      <span style={{ visibility:'hidden' }}>FUCKING</span>
      <span style={{
        position:'absolute', inset:'-3px -6px',
        background:LYD.ink, border:`2px solid ${LYD.cream}`, outline:`2px solid ${LYD.ink}`,
        borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center',
        color:LYD.cream, fontSize:'0.65em', fontFamily:'"JetBrains Mono", monospace',
        fontWeight:700, letterSpacing:'0.08em',
        animation:'lyd-censor-wobble 2.4s ease-in-out infinite',
      }}>F✶CKING</span>
    </span>
  );
}

// ─── Small tilted banner ──────────────────────────────────────────────────────
function SmallBanner() {
  const phrase = (
    <span style={{ display:'inline-flex', alignItems:'center', gap:10 }}>
      <span>LEASH YOUR</span><CensoredWord/><span>DOG</span>
      <span style={{ fontSize:'0.7em', padding:'0 8px' }}>✦</span>
    </span>
  );
  return (
    <div style={{
      background:LYD.orange, borderTop:`2px solid ${LYD.ink}`, borderBottom:`2px solid ${LYD.ink}`,
      transform:'rotate(-3deg)', margin:'0 -20px', overflow:'hidden', whiteSpace:'nowrap',
    }}>
      <div style={{
        display:'inline-block', padding:'7px 0',
        animation:'lyd-marquee 40s linear infinite',
        fontFamily:'var(--lyd-display)', fontSize:20, fontWeight:900, color:LYD.ink,
        letterSpacing:'var(--lyd-display-tracking)', textTransform:'var(--lyd-display-transform)', lineHeight:1,
      }}>
        {Array.from({length:10}).map((_,i) => <span key={i}>{phrase}</span>)}
      </div>
    </div>
  );
}

// ─── Dog placeholder (orange circle) ─────────────────────────────────────────
function DogIllustration({ size = 100 }) {
  return (
    <svg viewBox="0 0 200 200" width={size} height={size} style={{ display:'block' }}>
      <circle cx="100" cy="100" r="80" fill={LYD.orange} stroke="white" strokeWidth="10"/>
    </svg>
  );
}

// ─── Product popover (mobile full-screen sheet) ───────────────────────────────
function ProductSheet({ product, onClose }) {
  const [size, setSize]   = React.useState(product.sizes[0]);
  const [color, setColor] = React.useState(product.colors[0]);
  const [qty, setQty]     = React.useState(1);
  const [added, setAdded] = React.useState(false);
  const checkout = () => { setAdded(true); setTimeout(() => setAdded(false), 1800); };
  const lbl = { fontFamily:'var(--lyd-body)', fontSize:11, letterSpacing:'0.18em', fontWeight:700, color:LYD.ink, opacity:0.6 };

  return (
    <div onClick={onClose} style={{
      position:'absolute', inset:0, zIndex:200,
      background:'rgba(26,26,26,0.55)', backdropFilter:'blur(4px)',
      display:'flex', alignItems:'flex-end',
      animation:'lyd-backdrop-in 220ms ease both',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width:'100%', maxHeight:'88%', background:LYD.cream,
        border:`3px solid ${LYD.ink}`, borderRadius:'24px 24px 0 0',
        boxShadow:LYD.chunk(LYD.ink,0,-6),
        overflow:'auto', padding:'0 0 32px',
        animation:`lyd-modal-in 360ms ${LYD.spring} both`,
      }}>
        {/* drag handle */}
        <div style={{ display:'flex', justifyContent:'center', padding:'14px 0 8px' }}>
          <div style={{ width:48, height:5, borderRadius:999, background:LYD.ink, opacity:0.25 }}/>
        </div>

        {/* product image */}
        <div style={{ height:220, position:'relative', borderBottom:`3px solid ${LYD.ink}`, margin:'0 0 20px' }}>
          <StripedPlaceholder label={product.placeholderLabel} bg={product.bgColor} stripe={product.stripeColor}/>
          <div style={{
            position:'absolute', top:14, left:14, background:LYD.ink, color:LYD.cream,
            padding:'8px 14px', borderRadius:999, fontWeight:800, fontSize:15,
            transform:'rotate(-6deg)', boxShadow:LYD.chunk(LYD.cream,3,3),
          }}>${product.price}</div>
        </div>

        <div style={{ padding:'0 22px' }}>
          <div style={{ fontFamily:'var(--lyd-body)', fontSize:11, letterSpacing:'0.18em', color:LYD.orange, fontWeight:700, marginBottom:8 }}>
            ↳ LEASH YOUR DOG / SHOP
          </div>
          <h2 style={{
            fontFamily:'var(--lyd-display)', fontSize:28, lineHeight:0.95, margin:'0 0 8px', color:LYD.ink,
            letterSpacing:'var(--lyd-display-tracking)', textTransform:'var(--lyd-display-transform)',
          }}>{product.name}</h2>
          <div style={{ fontSize:13, color:LYD.ink, opacity:0.7, marginBottom:20 }}>{product.tag}</div>

          <div style={{ marginBottom:18 }}>
            <div style={lbl}>COLOR · {colorName(color)}</div>
            <div style={{ display:'flex', gap:10, marginTop:10 }}>
              {product.colors.map(c => (
                <button key={c} onClick={() => setColor(c)} style={{
                  width:44, height:44, borderRadius:999, background:c,
                  border:`2px solid ${LYD.ink}`,
                  boxShadow: color===c ? LYD.chunk(LYD.ink,3,3) : 'none',
                  cursor:'pointer', touchAction:'manipulation',
                  outline: color===c ? `3px solid ${LYD.orange}` : 'none',
                  outlineOffset: color===c ? 3 : 0,
                  transition:`all 160ms ${LYD.ease}`,
                }}/>
              ))}
            </div>
          </div>

          <div style={{ marginBottom:22 }}>
            <div style={lbl}>SIZE</div>
            <div style={{ display:'flex', gap:8, marginTop:10, flexWrap:'wrap' }}>
              {product.sizes.map(s => {
                const on = size===s;
                return (
                  <button key={s} onClick={() => setSize(s)} style={{
                    padding: s.length>3 ? '10px 16px' : 0, minWidth:52, height:52,
                    borderRadius: on ? 14 : 999,
                    background: on ? LYD.ink : LYD.cream, color: on ? LYD.cream : LYD.ink,
                    border:`2px solid ${LYD.ink}`, fontWeight:700, fontSize:15,
                    cursor:'pointer', touchAction:'manipulation',
                    boxShadow: on ? LYD.chunk(LYD.ink,2,2) : 'none',
                    transition:`all 180ms ${LYD.spring}`,
                  }}>{s}</button>
                );
              })}
            </div>
          </div>

          <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:22 }}>
            <div style={{ display:'flex', alignItems:'center', border:`2px solid ${LYD.ink}`, borderRadius:999, background:LYD.cream, overflow:'hidden' }}>
              <button onClick={() => setQty(q => Math.max(1,q-1))} style={{ width:44, height:48, border:'none', background:'transparent', fontSize:20, fontWeight:700, cursor:'pointer', color:LYD.ink, touchAction:'manipulation' }}>−</button>
              <div style={{ minWidth:36, textAlign:'center', fontFamily:'var(--lyd-body)', fontWeight:700, fontSize:18 }}>{qty}</div>
              <button onClick={() => setQty(q => q+1)} style={{ width:44, height:48, border:'none', background:'transparent', fontSize:20, fontWeight:700, cursor:'pointer', color:LYD.ink, touchAction:'manipulation' }}>+</button>
            </div>
            <PillButton variant={added ? 'dark' : 'primary'} size="lg" onClick={checkout} style={{ flex:1 }}>
              {added ? '✓ ADDED!' : `ADD TO CART · $${product.price * qty}`}
            </PillButton>
          </div>

          <div style={{ paddingTop:16, borderTop:`1.5px dashed ${LYD.ink}` }}>
            <div style={lbl}>THE DETAILS</div>
            <ul style={{ margin:'10px 0 0', padding:0, listStyle:'none', fontSize:14, lineHeight:1.55, color:LYD.ink }}>
              {product.details.map((d,i) => (
                <li key={i} style={{ display:'flex', gap:10, padding:'3px 0' }}>
                  <span style={{ color:LYD.orange, fontWeight:800 }}>✦</span><span>{d}</span>
                </li>
              ))}
            </ul>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Product card (compact) ───────────────────────────────────────────────────
function ProductCard({ product, onOpen }) {
  const [hover, setHover] = React.useState(false);
  return (
    <div
      onClick={onOpen}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        border:`2.5px solid ${LYD.ink}`, borderRadius:18, background:LYD.cream,
        cursor:'pointer', overflow:'hidden',
        boxShadow: hover ? LYD.chunk(LYD.ink,8,8) : LYD.chunk(LYD.ink,4,4),
        transform: hover ? 'translate(-2px,-2px) rotate(-0.5deg)' : 'translate(0,0)',
        transition:`transform 240ms ${LYD.spring}, box-shadow 180ms ${LYD.ease}`,
        flex: '0 0 auto', width: 160,
      }}
    >
      <div style={{ height:160, borderBottom:`2.5px solid ${LYD.ink}` }}>
        <StripedPlaceholder label={product.placeholderLabel} bg={product.bgColor} stripe={product.stripeColor}/>
      </div>
      <div style={{ padding:'12px 14px 14px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', gap:6 }}>
          <div style={{
            fontFamily:'var(--lyd-display)', fontSize:14, lineHeight:1,
            letterSpacing:'var(--lyd-display-tracking)', textTransform:'var(--lyd-display-transform)',
            color:LYD.ink, fontWeight:800,
          }}>{product.name}</div>
        </div>
        <div style={{ marginTop:4, fontWeight:700, fontSize:14, color:LYD.orange }}>${product.price}</div>
        <div style={{ marginTop:4, fontSize:10, color:LYD.ink, opacity:0.65, letterSpacing:'0.02em' }}>{product.tag}</div>
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [clipped, setClipped]   = React.useState(false);
  const [sheet, setSheet]       = React.useState(null);
  const [dogPos, setDogPos]     = React.useState({ x: 200, y: 420 });
  const dogPosRef               = React.useRef({ x: 200, y: 420 });
  const velRef                  = React.useRef({ vx: 1.8, vy: -1.4 });
  const [facing, setFacing]     = React.useState(-1);
  const [lasso, setLasso]       = React.useState([]);
  const lassoDrawingRef         = React.useRef(false);
  const [pop, setPop]           = React.useState(false);
  const stageRef                = React.useRef(null);
  const [stageBounds, setStageBounds] = React.useState({ w: 390, h: 844 });

  // Measure stage
  React.useEffect(() => {
    const update = () => {
      setStageBounds({ w: window.innerWidth, h: window.innerHeight });
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  // Dog roaming
  React.useEffect(() => {
    if (clipped) return;
    let raf;
    const tick = () => {
      const p = dogPosRef.current, v = velRef.current;
      const { w, h } = stageBounds;
      if (Math.random() < 0.01) { v.vx += (Math.random()-0.5)*0.6; v.vy += (Math.random()-0.5)*0.6; }
      const sp = Math.hypot(v.vx, v.vy);
      if (sp < 1) { v.vx += (Math.random()-0.5)*0.3; v.vy += (Math.random()-0.5)*0.3; }
      if (sp > 3.5) { v.vx = v.vx/sp*3.5; v.vy = v.vy/sp*3.5; }
      v.vx *= 0.98; v.vy *= 0.98;
      let nx = p.x+v.vx, ny = p.y+v.vy;
      // keep inside screen; reserve top area for hero text (roughly top 280px)
      const minX=60, maxX=w-60, minY=300, maxY=h-60;
      if (nx<minX) { nx=minX; v.vx=Math.abs(v.vx); }
      if (nx>maxX) { nx=maxX; v.vx=-Math.abs(v.vx); }
      if (ny<minY) { ny=minY; v.vy=Math.abs(v.vy); }
      if (ny>maxY) { ny=maxY; v.vy=-Math.abs(v.vy); }
      dogPosRef.current = { x:nx, y:ny };
      setDogPos({ x:nx, y:ny });
      if (Math.abs(v.vx) > 0.8) setFacing(v.vx>=0 ? 1 : -1);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [clipped, stageBounds]);

  const localPoint = (e) => {
    const rect = stageRef.current.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  };

  const onPointerDown = (e) => {
    if (clipped) return;
    lassoDrawingRef.current = true;
    setLasso([localPoint(e)]);
  };
  const onPointerMove = (e) => {
    if (!lassoDrawingRef.current) return;
    setLasso(p => [...p, localPoint(e)]);
  };
  const onPointerUp = () => {
    if (!lassoDrawingRef.current) return;
    lassoDrawingRef.current = false;
    const d = dogPosRef.current;
    if (pointInPolygon({ x:d.x, y:d.y }, lasso)) {
      setClipped(true);
      setPop(true);
      setTimeout(() => setPop(false), 1200);
      setTimeout(() => setLasso([]), 400);
    } else {
      setTimeout(() => setLasso([]), 350);
    }
  };

  return (
    <div
      ref={stageRef}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove}
      onPointerUp={onPointerUp} onPointerCancel={onPointerUp}
      style={{
        position:'relative', width:'100vw', height:'100vh',
        background:LYD.cream, overflow:'hidden',
        touchAction:'none', userSelect:'none',
      }}
    >
      {/* ── Hero text area (always visible) ── */}
      <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:20, pointerEvents:'none' }}>

        {/* Small tilted banner */}
        <div style={{ paddingTop:12, paddingBottom:18 }}>
          <SmallBanner/>
        </div>

        {/* Hero text */}
        <div style={{ padding:'10px 24px 0' }}>
          <h1 style={{
            fontFamily:'var(--lyd-display)',
            fontSize:'clamp(52px, 16vw, 90px)', lineHeight:0.88,
            letterSpacing:'var(--lyd-display-tracking)', textTransform:'var(--lyd-display-transform)',
            margin:0, color:LYD.ink, fontWeight:900,
          }}>
            Leash<br/>your<br/>
            <CensoredWord/><br/>
            dog.
          </h1>

          {/* Mission blurb */}
          <div style={{
            marginTop:18, display:'flex', flexDirection:'column', gap:24,
            paddingTop:14, borderTop:`2px solid ${LYD.ink}`,
          }}>
            <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
              <div style={{
                fontFamily:'var(--lyd-display)', fontSize:24, lineHeight:1, fontWeight:900,
                letterSpacing:'var(--lyd-display-tracking)', textTransform:'var(--lyd-display-transform)',
              }}>{COPY.missionHead}</div>
              <div style={{ fontSize:16, lineHeight:1.4, color:LYD.ink }}>
                {COPY.missionBody}
              </div>
            </div>
            <div style={{ display:'flex', gap:10 }}>
              <PillButton variant="ghost" size="sm">{COPY.sheltersBtn}</PillButton>
              <PillButton variant="ghost" size="sm">{COPY.storyBtn}</PillButton>
            </div>
          </div>

        </div>
      </div>

      {/* ── Running dog ── */}
      <div style={{
        position:'absolute',
        left: dogPos.x - 60, top: dogPos.y - 60,
        transform: `scaleX(${facing})`,
        transition:'transform 120ms linear',
        pointerEvents:'none', zIndex:15,
      }}>
        <DogIllustration size={120}/>
      </div>

      {/* ── Lasso path ── */}
      {!clipped && lasso.length > 1 && (
        <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%', pointerEvents:'none', zIndex:16 }}>
          <path
            d={`M ${lasso.map(p => `${p.x},${p.y}`).join(' L ')}`}
            fill="rgba(255,91,31,0.15)" stroke={LYD.orange}
            strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="8 6"
          />
        </svg>
      )}

      {/* ── "Good dog!" pop ── */}
      {pop && (
        <div style={{
          position:'absolute', left:dogPos.x-50, top:dogPos.y-80,
          fontFamily:'var(--lyd-display)', fontWeight:900, fontSize:22, color:LYD.orange,
          textShadow:`2px 2px 0 ${LYD.ink}`,
          animation:'lyd-lasso-pop 700ms ease-out both',
          pointerEvents:'none', zIndex:17,
        }}>GOOD BOY ✦</div>
      )}

      {/* ── Products (revealed after clip) ── */}
      {clipped && (
        <div style={{
          position:'absolute', bottom:0, left:0, right:0,
          zIndex:25, pointerEvents:'auto',
          background:LYD.cream,
          animation:`lyd-spring-in 480ms ${LYD.spring} both`,
        }}>
          <div style={{
            background:LYD.cream, borderTop:`3px solid ${LYD.ink}`,
            borderRadius:'24px 24px 0 0',
            boxShadow:`0 -4px 0 ${LYD.ink}`,
          }}>
            <div style={{ padding:'18px 24px 12px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div style={{
                fontFamily:'var(--lyd-display)', fontSize:20, fontWeight:900,
                letterSpacing:'var(--lyd-display-tracking)', textTransform:'var(--lyd-display-transform)',
              }}>SHOP</div>
              <div style={{
                fontFamily:'"JetBrains Mono", monospace', fontSize:10, letterSpacing:'0.15em',
                background:LYD.orange, color:LYD.cream, padding:'5px 10px', borderRadius:999,
                border:`2px solid ${LYD.ink}`, boxShadow:LYD.chunk(LYD.ink,2,2),
              }}>100% → SHELTERS</div>
            </div>
            <div style={{
              display:'flex', gap:16, overflowX:'auto', padding:'0 24px 24px',
              scrollSnapType:'x mandatory',
            }}>
              {PRODUCTS.map(p => (
                <div key={p.id} style={{ scrollSnapAlign:'start' }}>
                  <ProductCard product={p} onOpen={() => setSheet(p)}/>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}


      {/* ── Product sheet modal ── */}
      {sheet && <ProductSheet product={sheet} onClose={() => setSheet(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
